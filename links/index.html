<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTRL Studio — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="links/ctrl-logo.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      background: #0d0d0d;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 20px 64px;
    }

    .content {
      width: 100%;
      max-width: 440px;
    }

    /* HEADER */
    .header { text-align: center; margin-bottom: 36px; }

    .logo-wrap {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px; background: #fff; border-radius: 10px; margin-bottom: 12px;
    }

    .logo-inner {
      font-weight: 900; font-size: 7px; letter-spacing: 0.05em;
      text-align: center; color: #111; line-height: 1.2; text-transform: uppercase;
    }
    .logo-inner .bot { font-size: 13px; display: block; }

    .brand {
      color: #fff; font-size: 20px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; display: block;
    }
    .tagline {
      color: #444; font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; margin-top: 5px; display: block;
    }

    /* KEYBOARD */
    .kb-scene { perspective: 700px; width: 100%; }

    .keyboard {
      transform: rotateX(26deg) rotateZ(-3deg);
      transform-style: preserve-3d;
      background: #e2e0da;
      border-radius: 14px;
      padding: 20px 18px 24px;
      border: 1px solid #c8c6c0;
      box-shadow:
        0 4px 0 #b0aea8,
        0 8px 0 #989690,
        0 20px 50px rgba(0,0,0,0.8),
        inset 0 1px 0 #f5f3ef;
    }

    .kb-label {
      color: #aaa8a2; font-size: 8px; letter-spacing: 0.25em;
      text-transform: uppercase; text-align: center; margin-bottom: 16px;
    }

    .key-rows { display: flex; flex-direction: column; gap: 8px; }
    .key-row { display: flex; gap: 8px; align-items: stretch; }

    /* BASE KEY */
    .key {
      background: #f5f3ef;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 10px 12px 10px;
      text-decoration: none;
      position: relative;
      min-height: 62px;
      flex: 1;
      box-shadow:
        0 5px 0 #c0beb8,
        3px 0 0 #dddbd5,
        inset 0 1px 0 #ffffff,
        inset 1px 0 0 #faf8f4;
      transition: box-shadow 0.07s, transform 0.07s, background 0.07s;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
    .key:hover { background: #faf8f4; }
    .key:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #c0beb8, 1px 0 0 #dddbd5, inset 0 1px 0 #ffffff;
    }

    .key .k-main {
      font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: #2a2828; line-height: 1;
    }
    .key .k-sub {
      font-size: 8.5px; font-weight: 400; letter-spacing: 0.03em;
      color: #aaa; margin-top: 3px; line-height: 1;
    }
    .key .k-corner {
      position: absolute; top: 8px; right: 9px;
      font-size: 9px; color: #ccc; font-weight: 700;
    }

    /* CTRL KEY */
    .key-ctrl {
      background: #1e1e1e;
      box-shadow: 0 5px 0 #050505, 3px 0 0 #111, inset 0 1px 0 #333, inset 1px 0 0 #2a2a2a;
      flex: 1.8;
      cursor: default;
      animation: pressCtrl 5s ease-in-out infinite;
    }
    .key-ctrl:hover { background: #242424; }
    .key-ctrl:active { transform: translateY(4px); box-shadow: 0 1px 0 #050505, 1px 0 0 #111, inset 0 1px 0 #333; }
    .key-ctrl .k-main { color: #fff; font-size: 15px; font-weight: 900; letter-spacing: 0.12em; }
    .key-ctrl .k-sub { color: #444; font-size: 8px; }

    @keyframes pressCtrl {
      0%,82%,100% { transform: translateY(0); box-shadow: 0 5px 0 #050505, 3px 0 0 #111, inset 0 1px 0 #333, inset 1px 0 0 #2a2a2a; }
      86% { transform: translateY(4px); box-shadow: 0 1px 0 #050505, 1px 0 0 #111, inset 0 1px 0 #333; }
      90% { transform: translateY(0); box-shadow: 0 5px 0 #050505, 3px 0 0 #111, inset 0 1px 0 #333, inset 1px 0 0 #2a2a2a; }
    }

    /* ENTER KEY */
    .key-enter {
      background: #1e1e1e;
      box-shadow: 0 5px 0 #050505, 3px 0 0 #111, inset 0 1px 0 #333, inset 1px 0 0 #2a2a2a;
      flex: 1.4;
    }
    .key-enter:hover { background: #242424; }
    .key-enter:active { transform: translateY(4px); box-shadow: 0 1px 0 #050505, 1px 0 0 #111, inset 0 1px 0 #333; }
    .key-enter .k-main { color: #fff; font-size: 10px; letter-spacing: 0.06em; }
    .key-enter .k-sub { color: #444; }

    /* SPACEBAR */
    .key-space {
      flex: 4; flex-direction: row; align-items: center;
      justify-content: space-between; padding: 0 16px; min-height: 46px;
    }
    .key-space .k-label { font-size: 9px; color: #bbb; letter-spacing: 0.18em; text-transform: uppercase; }
    .key-space .k-url { font-size: 10px; font-weight: 700; color: #2a2828; letter-spacing: 0.04em; }

    /* FOOTER */
    .footer {
      margin-top: 40px; text-align: center;
      color: #2a2a2a; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    }

    /* ── DESKTOP: sin tilt, centrado, tamaño fijo ── */
    @media (min-width: 768px) {
      body { padding: 60px 40px 80px; justify-content: center; }
      .content { max-width: 500px; }
      .kb-scene { perspective: none; }
      .keyboard {
        transform: none;
        box-shadow:
          0 4px 0 #b0aea8,
          0 8px 0 #989690,
          0 24px 60px rgba(0,0,0,0.45),
          inset 0 1px 0 #f5f3ef;
      }
      .key { min-height: 68px; padding: 12px 14px; }
      .key .k-main { font-size: 12px; }
      .key .k-sub { font-size: 9px; }
      .key-ctrl .k-main { font-size: 16px; }
      .key-space .k-label { font-size: 10px; }
      .key-space .k-url { font-size: 11px; }
    }

    /* ── MOBILE SMALL ── */
    @media (max-width: 380px) {
      body { padding: 28px 12px 48px; }
      .keyboard { padding: 14px 12px 18px; }
      .key { min-height: 52px; padding: 8px 9px; }
      .key .k-main { font-size: 10px; }
      .key .k-sub { font-size: 7.5px; }
      .key-ctrl .k-main { font-size: 12px; }
      .key-space { padding: 0 10px; }
      .key-space .k-url { font-size: 9px; }
    }
  </style>
</head>
<body>

</html>
