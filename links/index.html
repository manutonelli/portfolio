<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="ctrl-logo.png" type="image/png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #EDECEA;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
  }

  .container {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 28px;
    position: relative;
  }

  .bg-text {
    position: fixed;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28vw;
    color: rgba(0,0,0,0.045);
    letter-spacing: -0.04em;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    user-select: none;
    pointer-events: none;
    white-space: nowrap;
    z-index: 0;
  }

  .brand {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease both;
  }

  .logo-mark {
    display: inline-block;
    background: #111;
    color: #EDECEA;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.12em;
    padding: 3px 8px 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .brand-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 64px;
    line-height: 0.88;
    letter-spacing: -0.02em;
    color: #111;
    text-transform: uppercase;
    display: block;
  }

  .tagline {
    font-size: 12px;
    letter-spacing: 0.18em;
    color: #888;
    text-transform: uppercase;
    margin-top: 12px;
    display: block;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: #111;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s 0.1s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

  .link-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 18px 22px;
    text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 2px solid #111;
    background: transparent;
    color: #111;
    cursor: pointer;
    transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #111;
    transform: translateX(-100%);
    transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
    z-index: 0;
  }

  .link-btn:hover::before { transform: translateX(0); }
  .link-btn:hover { color: #EDECEA; }
  .link-btn:hover .icon-stroke { stroke: #EDECEA; }
  .link-btn:hover .icon-fill { fill: #EDECEA; }
  .link-btn:hover .arrow-icon { stroke: #EDECEA; }

  .left {
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

  .left span { position: relative; z-index: 1; }

  .link-btn svg {
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .icon-stroke { transition: stroke 0.18s; }
  .icon-fill { transition: fill 0.18s; }
  .arrow-icon { transition: stroke 0.18s; position: relative; z-index: 1; }

  .link-btn.primary {
    background: #111;
    color: #EDECEA;
  }
  .link-btn.primary .icon-stroke { stroke: #EDECEA; }
  .link-btn.primary .icon-fill { fill: #EDECEA; }
  .link-btn.primary .arrow-icon { stroke: #EDECEA; }
  .link-btn.primary::before { background: #2a2a2a; }

  .link-btn:nth-child(1) { animation-delay: 0.2s; }
  .link-btn:nth-child(2) { animation-delay: 0.3s; }
  .link-btn:nth-child(3) { animation-delay: 0.4s; }
  .link-btn:nth-child(4) { animation-delay: 0.5s; }

  .footer {
    margin-top: 40px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #aaa;
    text-transform: uppercase;
    text-align: center;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s 0.6s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }
  .logo {
  width: 200px;
  max-width: 80%;
  height: auto;
  display: block;
  margin: 0 auto 24px;
}

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="bg-text">CTRL</div>

<div class="container">
  <div class="brand">
    <img src="ctrl-logo.png" alt="Ctrl Studio" class="logo">
    <span class="tagline">Tu web, bajo control</span>
  </div>

  <div class="divider"></div>

  <div class="links">

    <!-- WEB -->
    <a class="link-btn primary" href="https://www.ctrlstudiodev.com/" target="_blank">
      <span class="left">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8.5" class="icon-stroke" stroke="#EDECEA" stroke-width="1.8"/>
          <path d="M10 1.5C10 1.5 7 5.5 7 10s3 8.5 3 8.5" class="icon-stroke" stroke="#EDECEA" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M10 1.5C10 1.5 13 5.5 13 10s-3 8.5-3 8.5" class="icon-stroke" stroke="#EDECEA" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="1.5" y1="10" x2="18.5" y2="10" class="icon-stroke" stroke="#EDECEA" stroke-width="1.8"/>
          <path d="M2.5 6.5h15M2.5 13.5h15" class="icon-stroke" stroke="#EDECEA" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span>Sitio web</span>
      </span>
      <svg class="arrow-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#EDECEA" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="9" x2="15" y2="9"/>
        <polyline points="10,4 15,9 10,14"/>
      </svg>
    </a>

    <!-- WHATSAPP -->
    <a class="link-btn" href="https://api.whatsapp.com/send/?phone=542215906581&text&type=phone_number&app_absent=0" target="_blank">
      <span class="left">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2C5.58 2 2 5.36 2 9.5c0 1.7.57 3.27 1.53 4.54L2.5 18l4.2-1.34A8.08 8.08 0 0 0 10 17c4.42 0 8-3.36 8-7.5S14.42 2 10 2z"
            class="icon-stroke" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7.5 8c0-.28.22-.5.5-.5h.5a.5.5 0 0 1 .5.5l.25 1a.5.5 0 0 1-.13.49l-.37.37a4.1 4.1 0 0 0 1.89 1.89l.37-.37a.5.5 0 0 1 .49-.13l1 .25a.5.5 0 0 1 .5.5V12a.5.5 0 0 1-.5.5C9.57 12.5 7.5 10.43 7.5 8z"
            class="icon-stroke" stroke="#111" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>WhatsApp</span>
      </span>
      <svg class="arrow-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="9" x2="15" y2="9"/>
        <polyline points="10,4 15,9 10,14"/>
      </svg>
    </a>

    <!-- PORTFOLIO -->
    <a class="link-btn" href="https://www.ctrlstudiodev.com/yo" target="_blank">
      <span class="left">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="5" width="16" height="13" rx="1.5" class="icon-stroke" stroke="#111" stroke-width="1.8"/>
          <path d="M7 5V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1" class="icon-stroke" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="2" y1="10" x2="18" y2="10" class="icon-stroke" stroke="#111" stroke-width="1.8"/>
          <line x1="10" y1="10" x2="10" y2="18" class="icon-stroke" stroke="#111" stroke-width="1.8"/>
        </svg>
        <span>Portfolio</span>
      </span>
      <svg class="arrow-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="9" x2="15" y2="9"/>
        <polyline points="10,4 15,9 10,14"/>
      </svg>
    </a>

    <!-- INSTAGRAM -->
    <a class="link-btn" href="https://www.instagram.com/ctrlstudio.dev/" target="_blank">
      <span class="left">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2.5" y="2.5" width="15" height="15" rx="4" class="icon-stroke" stroke="#111" stroke-width="1.8"/>
          <circle cx="10" cy="10" r="3.5" class="icon-stroke" stroke="#111" stroke-width="1.8"/>
          <circle cx="14.8" cy="5.2" r="1" class="icon-fill" fill="#111"/>
        </svg>
        <span>Instagram</span>
      </span>
      <svg class="arrow-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="9" x2="15" y2="9"/>
        <polyline points="10,4 15,9 10,14"/>
      </svg>
    </a>

  </div>

  <div class="footer">Build. Launch. Ctrl.</div>
</div>

</body>
</html>
