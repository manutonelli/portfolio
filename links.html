<title>ctrlstudio.dev — Links</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0f0f0f;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Open Sans', sans-serif;
  padding: 48px 24px;
}

.container {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

/* Logo */
.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.logo {
  height: 64px;
  width: auto;
  filter: invert(1);
}

.tagline {
  font-family: 'Open Sans', sans-serif;
  font-size: 11px;
  color: #444;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Links */
.links {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
}

.link-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  background: #161616;
  border: 1px solid #1e1e1e;
  border-radius: 4px;
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  cursor: pointer;
}

.link-btn:hover {
  background: #1a1a1a;
  border-color: #2a2a2a;
  transform: translateX(4px);
}

.link-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.link-icon { background: #161616; border: 1px solid #1e1e1e;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}






.link-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.link-label {
  font-family: 'Open Sans', sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #444;
}

.link-value {
  font-family: 'League Spartan', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: #EFEFEC;
  letter-spacing: -0.3px;
}

.link-arrow {
  font-size: 18px;
  color: #2a2a2a;
  transition: color 0.2s, transform 0.2s;
}

.link-btn:hover .link-arrow {
  color: #EFEFEC;
  transform: translateX(4px);
}

/* Footer */
.footer-text {
  font-family: 'Open Sans', sans-serif;
  font-size: 10px;
  color: #2a2a2a;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
}
</style>
</head>
